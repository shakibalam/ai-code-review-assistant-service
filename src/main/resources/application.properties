# ---------------------------------------------------------
# Application Configuration
# ---------------------------------------------------------
server.port=8080
spring.application.name=ai-pr-review-assistant

# JSON naming strategy
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.deserialization.fail-on-unknown-properties=false

# ---------------------------------------------------------
# Bitbucket Integration Settings
# ---------------------------------------------------------
bitbucket.base-url=https://api.bitbucket.org/2.0
bitbucket.workspace=${BITBUCKET_WORKSPACE:demo-workspace}
bitbucket.repository=${BITBUCKET_REPO:demo-repo}
bitbucket.username=${BITBUCKET_USERNAME:admin}
bitbucket.app-password=${BITBUCKET_APP_PASSWORD:password}
bitbucket.webhook-secret=${BITBUCKET_WEBHOOK_SECRET:my-secret-token}
bitbucket.timeout-ms=3000

# ---------------------------------------------------------
# LLM (AI) API Configuration
# ---------------------------------------------------------
# OPENAI (Paid)
# llm.openai.endpoint=https://api.openai.com/v1/chat/completions
# llm.openai.model=gpt-3.5-turbo

# GOOGLE GEMINI (Free Tier available at https://aistudio.google.com/)
llm.openai.endpoint=https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
llm.openai.model=gemini-2.5-flash

llm.openai.api-key=AIzaSyDNXiuozr0c4NYnyCeIIr5M7NTvEp2FEgY
llm.openai.timeout-ms=30000
llm.openai.max-retries=3

# ---------------------------------------------------------
# Logging Configuration
# ---------------------------------------------------------
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] [%t] %-5p %c{1} - %m%n
logging.level.com.flyct.prreview=DEBUG
