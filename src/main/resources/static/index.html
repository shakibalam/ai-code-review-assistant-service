<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PR Review Assistant</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .font-mono { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .accent-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        .prose pre { background: #1e293b; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; color: #e2e8f0; }
        .prose code { color: #818cf8; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                bot: <><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></>,
                zap: <><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 16 4-4 4 4"/></>,
                code: <><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></>,
                sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></>,
                'message-square': <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
                'alert-circle': <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></>,
                'rotate-ccw': <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
                brain: <><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/></>,
                'file-code': <><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m10 12-2 2 2 2"/><path d="m14 16 2-2-2-2"/></>
            };
            return (
                <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [formData, setFormData] = useState({
                repo: '',
                prId: '',
                diff: '',
                postComment: false
            });
            const [loading, setLoading] = useState(false);
            const [response, setResponse] = useState(null);
            const [error, setError] = useState(null);

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                setResponse(null);

                // Use the raw diff from state
                const payload = {
                    ...formData,
                    diff: formData.diff
                };
                console.log("Sending Payload:", JSON.stringify(payload));

                try {
                    const res = await fetch('/manual/review', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) {
                        const errText = await res.text();
                        throw new Error(`Server returned ${res.status}: ${errText}`);
                    }

                    const data = await res.json();
                    if (!data) throw new Error('Received empty response from server.');

                    setResponse(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                    setTimeout(() => lucide.createIcons(), 100);
                }
            };

            return (
                <div className="min-h-screen bg-slate-950 p-4 md:p-8">
                    {/* Header */
                    console.log("App Rendering")}
                    <header className="max-w-6xl mx-auto mb-10 flex justify-between items-center">
                        <div className="flex items-center space-x-3">
                            <div className="p-2 bg-indigo-600 rounded-lg">
                                <Icon name="bot" className="text-white" />
                            </div>
                            <h1 className="text-2xl font-bold tracking-tight text-white">FLYCT <span className="text-indigo-400">PR Review AI Assistant Service</span></h1>
                        </div>
                        <div className="text-sm text-slate-400 hidden md:block">
                            Intelligent Code Analysis Service
                        </div>
                    </header>


                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Form Section */}
                        <div className="lg:col-span-5">
                            <form onSubmit={handleSubmit} className="glass rounded-2xl p-6 accent-glow space-y-6">
                                <div className="space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2">
                                            <label className="text-sm font-medium text-slate-400">Repository Name</label>
                                            <input 
                                                type="text" 
                                                name="repo"
                                                value={formData.repo}
                                                onChange={handleInputChange}
                                                placeholder="e.g. my-awesome-project"
                                                className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                required
                                            />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-sm font-medium text-slate-400">Pull Request ID</label>
                                            <input 
                                                type="text" 
                                                name="prId"
                                                value={formData.prId}
                                                onChange={handleInputChange}
                                                placeholder="e.g. 123"
                                                className="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                                                required
                                            />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-sm font-medium text-slate-400 flex justify-between">
                                            <span>Diff Content</span>
                                            <span className="text-[10px] uppercase text-slate-500">Paste your git diff here</span>
                                        </label>
                                        <textarea 
                                            name="diff"
                                            value={formData.diff}
                                            onChange={(e) => setFormData(prev => ({ ...prev, diff: e.target.value }))}
                                            placeholder="diff --git a/src/main.js b/src/main.js..."
                                            className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-xs font-mono h-64 focus:ring-2 focus:ring-indigo-500 outline-none transition-all custom-scrollbar resize-none"
                                            required
                                        ></textarea>
                                    </div>

                                    <div className="flex items-center justify-between p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                                        <div className="flex items-center space-x-3">
                                            <Icon name="message-square" className="text-indigo-400" />
                                            <div>
                                                <p className="text-sm font-medium">Post to Bitbucket</p>
                                                <p className="text-[10px] text-slate-500">Automatically add review comments</p>
                                            </div>
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input 
                                                type="checkbox" 
                                                name="postComment"
                                                checked={formData.postComment}
                                                onChange={handleInputChange}
                                                className="sr-only peer" 
                                            />
                                            <div className="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                                        </label>
                                    </div>
                                </div>

                                <button 
                                    type="submit" 
                                    disabled={loading}
                                    className={`w-full py-3 rounded-xl text-white font-semibold flex items-center justify-center space-x-2 ${loading ? 'bg-slate-700 cursor-not-allowed' : 'btn-primary'}`}
                                >
                                    {loading ? (
                                        <>
                                            <div className="animate-spin rounded-full h-5 w-5 border-t-2 border-b-2 border-white"></div>
                                            <span>Analyzing Code...</span>
                                        </>
                                    ) : (
                                        <>
                                            <Icon name="zap" size={18} />
                                            <span>Review Pull Request</span>
                                        </>
                                    )}
                                </button>
                            </form>
                        </div>

                        {/* Result Section */}
                        <div className="lg:col-span-7">
                            {!response && !error && !loading && (
                                <div className="h-full flex flex-col items-center justify-center glass rounded-2xl p-12 border-dashed border-2 border-slate-700">
                                    <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4">
                                        <Icon name="code" className="text-slate-500" size={32} />
                                    </div>
                                    <h3 className="text-lg font-medium text-slate-300">No Review Generated</h3>
                                    <p className="text-sm text-slate-500 text-center mt-2 max-w-xs">
                                        Submit your code diff to get an instant AI-powered code review with suggestions and improvements.
                                    </p>
                                </div>
                            )}

                            {loading && (
                                <div className="h-full flex flex-col items-center justify-center glass rounded-2xl p-12">
                                    <div className="relative">
                                        <div className="w-20 h-20 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
                                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                                            <Icon name="brain" className="text-indigo-400" size={24} />
                                        </div>
                                    </div>
                                    <h3 className="mt-6 text-indigo-300 font-medium animate-pulse">Scanning for potential issues...</h3>
                                </div>
                            )}

                            {error && (
                                <div className="glass rounded-2xl p-6 border-red-500/30">
                                    <div className="flex items-center space-x-3 text-red-400 mb-4">
                                        <Icon name="alert-circle" />
                                        <h3 className="font-bold">Error Encountered</h3>
                                    </div>
                                    <p className="text-slate-300 text-sm bg-red-500/10 p-4 rounded-lg border border-red-500/20">{error}</p>
                                </div>
                            )}

                            {response && (
                                <div className="glass rounded-2xl overflow-hidden flex flex-col h-[calc(100vh-12rem)] min-h-[600px]">
                                    <div className="p-6 bg-slate-800/80 border-b border-slate-700 flex justify-between items-center">
                                        <div className="flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-emerald-500/20 rounded-full flex items-center justify-center">
                                                <Icon name="sparkles" className="text-emerald-400" />
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-slate-100">AI Review Feedback</h3>
                                                <p className="text-[10px] text-slate-400 uppercase tracking-widest">Model: GPT-4 Equivalent</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center space-x-2 bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full text-xs font-medium border border-emerald-500/20">
                                            <div className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                                            <span>Analysis Complete</span>
                                        </div>
                                    </div>
                                    <div className="p-8 overflow-y-auto custom-scrollbar flex-1 bg-slate-900/30">
                                        <div className="prose prose-invert prose-indigo max-w-none prose-sm">
                                            <h4 className="text-slate-200 font-semibold mb-2">Summary</h4>
                                            <p className="text-slate-400 mb-6">{response.summary || 'No summary provided.'}</p>
                                            
                                            {response.suggestions && response.suggestions.length > 0 ? (
                                                <div className="space-y-4">
                                                    <h4 className="text-slate-200 font-semibold">Code Suggestions</h4>
                                                    {response.suggestions.map((s, i) => {
                                                        console.log("Suggestion object:", s);
                                                        return (
                                                            <div key={i} className="bg-slate-800 p-4 rounded-lg border border-slate-700">
                                                                <div className="flex items-center space-x-2 text-indigo-400 text-xs mb-2 font-mono">
                                                                    <Icon name="file-code" size={14} />
                                                                    <span>{s.file_path || s.filePath || 'Unknown File'}</span>
                                                                    {(s.line_number || s.lineNumber) && <span>:L{s.line_number || s.lineNumber}</span>}
                                                                </div>
                                                                <p className="text-slate-300 text-sm whitespace-pre-line">
                                                                    {s.comment.split('```').map((part, idx) => {
                                                                        if (idx % 2 === 1) {
                                                                            // Extract language identifier if present
                                                                            const lines = part.split('\n');
                                                                            const language = lines[0].match(/^[a-z]+$/) ? lines[0] : null;
                                                                            const code = language ? lines.slice(1).join('\n') : part;
                                                                            return (
                                                                                <pre key={idx} className="bg-slate-950 p-3 rounded-md border border-slate-700 my-2 overflow-x-auto text-xs text-emerald-400 font-mono">
                                                                                    {language && <div className="text-[10px] text-slate-500 mb-1 uppercase">{language}</div>}
                                                                                    <code>{code}</code>
                                                                                </pre>
                                                                            );
                                                                        }
                                                                        return <span key={idx}>{part}</span>;
                                                                    })}
                                                                </p>                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ) : (
                                                <div className="bg-slate-800/50 p-4 rounded-lg border border-slate-700/50 flex items-center space-x-3 text-slate-500 italic">
                                                    <Icon name="check-circle" size={16} />
                                                    <span>No actionable suggestions found for this diff.</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    <div className="p-4 bg-slate-800/80 border-t border-slate-700 flex justify-between items-center">
                                        <p className="text-[10px] text-slate-500">Processed with Bitbucket API v2.0</p>
                                        <button 
                                            onClick={() => setResponse(null)}
                                            className="text-xs text-slate-400 hover:text-white transition-colors flex items-center space-x-1"
                                        >
                                            <Icon name="rotate-ccw" size={14} />
                                            <span>Clear Results</span>
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                    
                    <footer className="max-w-6xl mx-auto mt-12 pt-8 border-t border-slate-800 text-center">
                        <p className="text-slate-500 text-xs">© 2024 PR Review Assistant. Empowering developers with AI insight.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
